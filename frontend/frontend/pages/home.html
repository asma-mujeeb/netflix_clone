<!DOCTYPE html>
<html>
<head>
    <title>Netflix Clone</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<!-- NAVBAR -->
<div class="navbar">
    <div class="logo">NETFLIX</div>
    <!-- Search bar -->
<div style="padding:10px 30px;">
    <input id="searchInput" placeholder="Search movies..."
        style="padding:10px;width:100%;max-width:400px;">
</div>
    <button onclick="logout()">Logout</button>
</div>


<!-- HERO -->
<div id="hero" class="hero">
    <div class="hero-content">
    <h1>Loading...</h1>
    <p>Please wait while we load your movies</p>
    </div>
    <img src="../assets/hero.jpg" alt="Hero Image">
</div>

<!-- MOVIES -->
<h2 class="section-title">Trending Now</h2>
<div id="moviesContainer" class="movie-row"></div>

<script src="../js/app.js"></script>

</body>
</html>
