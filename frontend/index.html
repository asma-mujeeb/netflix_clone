<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Netflix Clone</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- NAVBAR -->
<div class="navbar">
  <h1 class="logo">NETFLIX</h1>
  <ul>
    <li>Home</li>
    <li>TV Shows</li>
    <li>Movies</li>
    <li>My List</li>
  </ul>
</div>

<!-- HERO SECTION -->
<div class="banner">
  <div class="banner-content">
    <h1>Stranger Things</h1>
    <p>Season 4 | New Episodes</p>

    <div class="buttons">
      <button class="play-btn">▶ Play</button>
      <button class="info-btn">ℹ More Info</button>
    </div>
  </div>
</div>

<!-- MOVIE ROW -->
<div class="row">
  <h2>Trending Now</h2>
  <div class="row-posters">
    <img src="https://image.tmdb.org/t/p/w500/qJ2tW6WMUDux911r6m7haRef0WH.jpg">
    <img src="https://image.tmdb.org/t/p/w500/7WsyChQLEftFiDOVTGkv3hFpyyt.jpg">
    <img src="https://image.tmdb.org/t/p/w500/9Gtg2DzBhmYamXBS1hKAhiwbBKS.jpg">
  </div>
</div>

<script src="js/script.js"></script>
</body>
</html>
